[build]
  command = "rm -rf .next && npm run build"
  publish = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "20"
  npm_config_cache = "/opt/build/cache/npm"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Run expiry check every day at 8am Ethiopia time (5am UTC)
[[crons]]
  schedule = "0 5 * * *"
  command = "curl -s -H 'x-cron-secret: $CRON_SECRET' $NEXT_PUBLIC_APP_URL/api/listings/check-expiry"
